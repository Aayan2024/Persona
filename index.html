<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona | Your Personal AI Stylist</title>
    <!-- Keep EmailJS for your logs -->
    <script src="https://jsdelivr.net"></script>
    <script>emailjs.init("D_WqKgcxqgi0GFq1k");</script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9A4A4;
            --gold: #c5a059;
            --black: #1a1a1a;
            --input-bg: #ffffff;
            --border: #e0dcd5;
            --form-bg: rgba(255,255,255,0.65);
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .main-wrapper { width: 100%; max-width: 480px; margin: 0 auto; }
        .form-container {
            background: var(--form-bg); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.6); border-radius: 16px; padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        header { text-align: center; margin-bottom: 24px; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin: 0; font-weight: 700; }
        header h1 span { color: var(--gold); font-style: italic; }
        header p { letter-spacing: 4px; font-size: 0.65rem; color: #666; text-transform: uppercase; margin-top: 5px; }

        .section-label { color: var(--gold); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin: 22px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        input[type="text"] {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 0.9rem; outline: none; transition: 0.2s;
        }
        input[type="text"]:focus { border-color: var(--gold); }
        .pill-select { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .pill-opt {
            padding: 8px 16px; background: white; border: 1px solid var(--border);
            border-radius: 50px; cursor: pointer; font-size: 0.75rem; transition: all 0.2s;
        }
        .pill-opt.chosen { background: var(--black); color: white; border-color: var(--black); }
        
        /* Result & Grid Styles */
        .result-section { display: none; }
        .shoppable-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); animation: fadeUp 0.4s ease forwards; }
        .product-card img { width: 100%; height: 160px; object-fit: cover; }
        .product-info { padding: 10px; font-size: 0.7rem; }
        .product-brand { font-weight: 700; display: block; color: var(--black); }
        .product-name { color: #777; font-size: 0.65rem; margin-bottom: 8px; display: block; }
        .buy-link { 
            display: block; text-align: center; background: var(--black); 
            color: white; text-decoration: none; padding: 7px; 
            border-radius: 4px; font-weight: 600; font-size: 0.7rem;
        }
        
        .generate-btn { 
            width: 100%; background: var(--black); color: white; padding: 18px; 
            border: none; border-radius: 8px; font-weight: 600; text-transform: uppercase; 
            letter-spacing: 2px; margin-top: 20px; cursor: pointer; transition: 0.2s;
        }
        .generate-btn:hover { background: #333; }

        #loadingScreen { display: none; text-align: center; padding: 60px 20px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- INPUT FORM -->
    <div class="form-container" id="mainForm">
        <header>
            <h1>Pers<span>ona</span></h1>
            <p>Your AI Stylist</p>
        </header>

        <div class="section-label">Identity</div>
        <input type="text" id="userName" placeholder="Your Name or Style Preference">
        
        <div class="section-label">The Occasion</div>
        <div class="pill-select" id="occasionGroup">
            <div class="pill-opt" onclick="selectPill(this)">Date Night</div>
            <div class="pill-opt" onclick="selectPill(this)">Job Interview</div>
            <div class="pill-opt" onclick="selectPill(this)">Wedding</div>
            <div class="pill-opt" onclick="selectPill(this)">Casual Hangout</div>
        </div>

        <button class="generate-btn" id="submitBtn" onclick="generateStyle()">Style Me Instantly</button>
    </div>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p style="font-style: italic; font-family: 'Playfair Display'; font-size: 1.1rem;">Crafting your persona...</p>
    </div>

    <!-- RESULT SECTION -->
    <div class="form-container result-section" id="resultSection"></div>
</div>

<script>
    function selectPill(el) {
        el.parentElement.querySelectorAll('.pill-opt').forEach(opt => opt.classList.remove('chosen'));
        el.classList.add('chosen');
    }

    function generateStyle() {
        const nameInput = document.getElementById('userName').value;
        const occasion = document.querySelector('#occasionGroup .chosen')?.innerText || "Special Occasion";

        if(!nameInput) { alert("Please enter your name!"); return; }

        // 1. Send to EmailJS (Your Logging System)
        // This fires in the background so you can monitor logs/injection attempts
        emailjs.send("service_x9r8o7g", "template_p0y8v9s", {
            from_name: nameInput,
            occasion: occasion,
            message: `User: ${nameInput} is looking for a ${occasion} outfit.`
        });

        // 2. Immediate UI Transition
        document.getElementById('mainForm').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'block';

        // 3. Simulated AI Selection Logic
        const lookbook = {
            "Date Night": {
                note: "Aim for 'Modern Minimalist'. Dark tones with a single texture pop work best.",
                items: [
                    { brand: "SNITCH", name: "Solid Black Shirt", price: "₹1,499", img: "https://unsplash.com" },
                    { brand: "ZARA", name: "Slim Fit Trousers", price: "₹2,990", img: "https://unsplash.com" }
                ]
            },
            "Job Interview": {
                note: "Stick to the 'Power Neutral' palette. Navy and White signal reliability.",
                items: [
                    { brand: "Louis Philippe", name: "Sky Blue Formal", price: "₹2,499", img: "https://unsplash.com" },
                    { brand: "Peter England", name: "Navy Chinos", price: "₹1,899", img: "https://unsplash.com" }
                ]
            },
            "Wedding": {
                note: "Royal Ethnic is the way to go. Focus on fit and fabric quality.",
                items: [
                    { brand: "Manyavar", name: "Linen Kurta", price: "₹3,999", img: "https://unsplash.com" },
                    { brand: "FabIndia", name: "Silk Nehru Jacket", price: "₹4,500", img: "https://unsplash.com" }
                ]
            },
            "Casual Hangout": {
                note: "Relaxed fit is king here. Oversized tees with straight denim.",
                items: [
                    { brand: "H&M", name: "Relaxed Fit Tee", price: "₹799", img: "https://unsplash.com" },
                    { brand: "Levis", name: "501 Original", price: "₹4,200", img: "https://unsplash.com" }
                ]
            }
        };

        const result = lookbook[occasion] || lookbook["Casual Hangout"];

        // 4. Show Result after "Processing"
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
            const resSection = document.getElementById('resultSection');
            resSection.style.display = 'block';

            let itemsHTML = '';
            result.items.forEach(item => {
                itemsHTML += `
                    <div class="product-card">
                        <img src="${item.img}">
                        <div class="product-info">
                            <span class="product-brand">${item.brand}</span>
                            <span class="product-name">${item.name}</span>
                            <a href="#" class="buy-link">Get for ${item.price}</a>
                        </div>
                    </div>
                `;
            });

            resSection.innerHTML = `
                <header>
                    <p style="color: var(--gold); letter-spacing: 2px; font-size: 0.6rem;">THE PERSONA CURATION</p>
                    <h2 style="font-family: 'Playfair Display'; margin: 5px 0;">Style Set for ${nameInput.split(' ')[0]}</h2>
                </header>
                <div style="font-size: 0.75rem; background: white; padding: 15px; border-radius: 8px; border-left: 3px solid var(--gold); margin: 15px 0 20px; line-height: 1.4;">
                    <strong>Why this works:</strong> ${result.note}
                </div>
                <div class="shoppable-grid">${itemsHTML}</div>
                <button class="generate-btn" style="margin-top:25px; background: transparent; color: black; border: 1px solid black;" onclick="location.reload()">Reset Stylist</button>
            `;
        }, 2200);
    }
</script>

</body>
</html>
